<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的 GitHub Pages</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 680px;
      background: var(--card);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.7;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      background: var(--primary);
      color: #fff;
      padding: 10px 18px;
      border-radius: 10px;
      font-weight: 600;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .footer {
      margin-top: 18px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    code {
      background: #eef2ff;
      color: #3730a3;
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>你好，GitHub Pages！</h1>
    <p>
      Still decorating! Just wait a moment :) It will come sooner within 3.20
    </p>
    <a class="btn" href="https://github.com/" target="_blank" rel="noopener noreferrer">
      访问 GitHub
    </a>
    <div class="footer">由 GitHub Pages 驱动</div>
  </main>
</body>
</html>
